name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enable Corepack
        run: corepack enable

      - name: Install workspace dependencies
        run: corepack pnpm@10.22.0 install --frozen-lockfile

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e backend/api[dev]

      - name: Install Playwright Chromium
        run: corepack pnpm@10.22.0 --filter @moneypulse/web exec playwright install --with-deps chromium

      - name: Run core tests
        run: corepack pnpm@10.22.0 --filter @moneypulse/core test

      - name: Run frontend unit tests
        run: corepack pnpm@10.22.0 --filter @moneypulse/web test

      - name: Run backend tests
        working-directory: backend/api
        run: pytest

      - name: Run full typecheck
        run: corepack pnpm@10.22.0 typecheck

      - name: Run builds
        run: corepack pnpm@10.22.0 build

      - name: Run Playwright end-to-end tests
        env:
          MONEYPULSE_PYTHON_BIN: python
        run: corepack pnpm@10.22.0 --filter @moneypulse/web test:e2e
